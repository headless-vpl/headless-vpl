<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headless VPL — Flow Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f23; }
    #canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #workspace {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <svg id="workspace"></svg>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
