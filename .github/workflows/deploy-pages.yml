name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - run: bun install --frozen-lockfile

      # デモサイト（Vite）ビルド
      - name: Build demo site
        run: bun run build

      # VitePress ドキュメントビルド
      - name: Build docs
        run: bun run docs:build

      # 2つの出力を _site/ にマージ
      - name: Merge build outputs
        run: |
          mkdir -p _site
          cp -r dist/* _site/
          mkdir -p _site/docs
          cp -r docs-site/.vitepress/dist/* _site/docs/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
